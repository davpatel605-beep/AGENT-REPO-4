name: Master Flipkart Updater

on:
  schedule:
    - cron: "30 1 */3 * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install supabase alterlab beautifulsoup4

      - name: Run master updater
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          ALTERLAB_API_KEY:  ${{ secrets.ALTERLAB_API_KEY }}
        run: |
          python master_updater.py
