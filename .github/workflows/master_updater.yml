name: Flipkart Price Updater (AlterLab)

on:
  schedule:
    # Har 3 din — 7:00 AM IST = 1:30 AM UTC
    - cron: "30 1 */3 * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install alterlab beautifulsoup4
          pip install "supabase==2.3.4" "gotrue==2.4.2" "httpx==0.25.2"
        # WHY THESE EXACT VERSIONS:
        # supabase 2.3.4 → httpx >=0.24, <0.26 chahiye (line 74 error se confirm)
        # httpx 0.25.2   → supabase ki range mein hai + 'proxy' param exist karta hai
        # gotrue 2.4.2   → proxy bug nahi hai is version mein
        # httpx 0.25.2 is the ONLY version that satisfies ALL three conditions

      - name: Run price updater
        env:
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          ALTERLAB_API_KEY: ${{ secrets.ALTERLAB_API_KEY }}
        run: python master_updater.py

