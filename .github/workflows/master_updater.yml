name: Flipkart Price Updater — Agent Mode

on:
  schedule:
    - cron: "30 1 */3 * *"   # Har 3 din — 7:00 AM IST
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          pip install "supabase==2.3.4" "gotrue==2.4.2" "httpx==0.25.2"

      - name: Run price updater
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          ALTERLAB_API_KEY:    ${{ secrets.ALTERLAB_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
        run: python master_updater.py

