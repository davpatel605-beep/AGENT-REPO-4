name: Master Flipkart Updater

# ══════════════════════════════════════════════════════
# SCHEDULE: Every 3 days at 7:00 AM IST (1:30 AM UTC)
# ══════════════════════════════════════════════════════
on:
  schedule:
    - cron: "30 1 */3 * *"   # 1:30 AM UTC = 7:00 AM IST, every 3 days

  workflow_dispatch:          # Manual trigger bhi available hai

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # GitHub Free max = 6 hours

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 supabase

      - name: Run master updater
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          SCRAPEDO_TOKEN:  ${{ secrets.SCRAPEDO_TOKEN }}
        run: |
          python master_updater.py

