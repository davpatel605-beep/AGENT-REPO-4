name: Master Flipkart Updater

# ══════════════════════════════════════════════════════
# SCHEDULE: Every 3 days at 7:00 AM IST (1:30 AM UTC)
# Cron format: minute hour day-of-month month day-of-week
# "*/3" = every 3 days
# ══════════════════════════════════════════════════════
on:
  schedule:
    - cron: "30 1 */3 * *"   # 1:30 AM UTC = 7:00 AM IST, every 3 days

  workflow_dispatch:          # Manual trigger bhi available hai

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # GitHub Free max = 6 hours

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 supabase

      - name: Run master updater
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          SCRAPERAPI_KEY:    ${{ secrets.SCRAPERAPI_KEY }}
          SCRAPERAPI_KEY_2:  ${{ secrets.SCRAPERAPI_KEY_2 }}
          SCRAPERAPI_KEY_3:  ${{ secrets.SCRAPERAPI_KEY_3 }}
          SCRAPERAPI_KEY_4:  ${{ secrets.SCRAPERAPI_KEY_4 }}
          SCRAPERAPI_KEY_5:  ${{ secrets.SCRAPERAPI_KEY_5 }}
          SCRAPERAPI_KEY_6:  ${{ secrets.SCRAPERAPI_KEY_6 }}
          SCRAPERAPI_KEY_7:  ${{ secrets.SCRAPERAPI_KEY_7 }}
          SCRAPERAPI_KEY_8:  ${{ secrets.SCRAPERAPI_KEY_8 }}
        run: |
          python master_updater.py

